# Tracked user profile. Edit in place; commit your changes.
# The synthesis prompt reads this file at runtime to bias categorization
# and prioritization.

# Your professional role and current focus, in one or two sentences.
role: |
  "Software engineer focused on real-time control systems for humanoid robots"

# Keywords or topics to prioritize when ranking items.
# Mix of professional (career signal) and personal (leisure signal) — the
# synthesis prompt uses these to weight items, so leisure terms here ensure
# concert / theme-park signals get airtime, not just industry news.
priority_keywords:
  # Career
  - "humanoid whole-body control"
  - "real-time robot control"
  - "humanoid platform"
  - "dexterous robotic hand"
  - "robot software framework"
  # Leisure
  - "BLACKPINK"
  - "성시경"
  - "Disneyland"
  - "Walt Disney World"
  - "concert ticketing"

# Upcoming events that should boost related items.
# Use absolute dates (YYYY-MM-DD). Include both confirmed personal events and
# anticipated ones (e.g. ticketing windows you do not want to miss).
upcoming_events:
  - description: "성시경 축가 콘서트 — 연세대 노천극장"
    date: "2026-05-05"
  - description: "BLACKPINK Busan concerts — ticketing window expected"
    date: "2026-06-12"

# The output language for the briefing body.
# The JARVIS-voice opener and closer are always in English.
output_language: "ko"
