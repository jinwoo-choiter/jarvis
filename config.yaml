# Committed defaults. Safe to read by anyone.
# User-specific overrides live in `config.local.yaml` (gitignored).
# When both are present, `config.local.yaml` wins on a per-key basis.

arxiv:
  # arXiv categories to include in the daily brief.
  # `cs.RO` (Robotics) is the v1 reference category.
  # Add or replace categories in `config.local.yaml`.
  categories:
    - cs.RO

youtube:
  # Channel IDs (the `UC...` form, not the @handle).
  # Leave empty in the committed default; populate in `config.local.yaml`.
  channels: []

schedule:
  # Recommended cron schedule. The user registers cron themselves;
  # this entry exists only as documentation.
  cron: "0 7 * * *"
  timezone: "local"

window:
  # Lookback window for the deterministic fetchers (arXiv, YouTube).
  # arXiv and YouTube post at near-daily cadence, so 24h is the sensible default.
  hours: 24
  # Lookback window for the synthesis prompt's heuristic web_search branch
  # (career industry news + leisure topics like concerts, park events).
  # These cadences are weekly at best — a 24h heuristic window is almost
  # always empty.
  heuristic_hours: 168
